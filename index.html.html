<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite do Theo - Melancia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        :root {
            --vermelho: #bd1b1b;
            --verde-escuro: #58ba5d;
            --verde-claro: #b12020;
            --creme-fundo: #fef9e7;
            --preto-semente: #2d2d2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #164311;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container-central {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 600px;
            perspective: 1200px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 0.5s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            padding: 30px;
            backface-visibility: hidden;
        }

        .escondido { transform: rotateY(-180deg); opacity: 0; pointer-events: none; }
        .visivel { transform: rotateY(0deg) !important; opacity: 1 !important; z-index: 5 !important; }

        #tela-capa { background-color: var(--vermelho); border: 12px solid var(--verde-escuro); z-index: 3; }
        #tela-detalhes { background-color: var(--creme-fundo); border: 12px solid var(--vermelho); transform: rotateY(180deg); opacity: 0; }
        #tela-confirmacao { background-color: var(--verde-claro); border: 12px solid var(--verde-escuro); transform: rotateY(180deg); opacity: 0; }

        .melancia-ilustracao {
            width: 150px; height: 75px; background: var(--vermelho);
            border: 8px solid var(--verde-escuro); border-top: none;
            border-bottom-left-radius: 100px; border-bottom-right-radius: 100px;
            position: relative; margin-bottom: 30px; animation: flutuar 3s ease-in-out infinite;
        }

        .melancia-ilustracao::after { content: "• • •"; color: var(--preto-semente); font-size: 25px; position: absolute; top: 10px; left: 35px; }

        h1 { font-family: 'Fredoka One', cursive; color: white; font-size: 3rem; text-shadow: 3px 3px 0px var(--verde-escuro); }
        h2 { font-family: 'Fredoka One', cursive; color: var(--vermelho); font-size: 2.5rem; margin-bottom: 10px; }

        .badge-idade { background: var(--verde-escuro); color: white; padding: 8px 25px; border-radius: 50px; font-weight: bold; margin: 15px 0; box-shadow: 0 4px 0px #1b4d1e; }
        .info-box { background: white; width: 100%; padding: 20px; border-radius: 20px; border: 2px dashed var(--vermelho); margin: 20px 0; }

        .btn {
            background: var(--vermelho); color: white; border: none; padding: 15px 30px; border-radius: 50px;
            font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
            margin-top: 10px; box-shadow: 0 5px 0px #b71c1c; width: 80%;
        }

        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0px #b71c1c; }
        .btn-abrir { background: var(--verde-escuro); box-shadow: 0 5px 0px #1b4d1e; }

        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <!-- Este é um link direto de um arquivo MP3 estável e infantil -->
    <audio id="musica" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Funny-Kids.mp3" type="audio/mpeg">
    </audio>

    <div class="container-central">
        
        <div id="tela-capa" class="card visivel">
            <div class="melancia-ilustracao"></div>
            <h1>Theo</h1>
            <p style="color: white; margin-top: 10px; font-weight: bold;">Uma surpresa doce espera por você!</p>
            <button class="btn btn-abrir" onclick="iniciarTudo()">Abrir Convite</button>
        </div>

        <div id="tela-detalhes" class="card">
            <h2>Opa!</h2>
            <div class="badge-idade">7 MESES</div>
            <div class="info-box">
                <p>📅 <strong>16 de Maio</strong></p>
                <p>⏰ <strong>14:00 Horas</strong></p>
                <p>📍 <strong>Minha Casa</strong></p>
            </div>
            <button class="btn" onclick="confirmar()">Confirmar Ida</button>
        </div>

        <div id="tela-confirmacao" class="card">
            <h1 style="text-shadow: 2px 2px 0px var(--verde-escuro);">Oba!</h1>
            <p style="color: white; font-weight: bold; margin-top: 20px;">Presença Confirmada! 🍉</p>
            <p style="color: white; font-size: 0.9rem; margin-top: 10px;">Prepare-se para a diversão!</p>
        </div>

    </div>

    <script>
        const som = document.getElementById('musica');

        function iniciarTudo() {
            // O áudio toca apenas após este clique (exigência dos navegadores)[cite: 2]
            som.play().catch(error => console.log("Erro ao tocar áudio: ", error));

            document.getElementById('tela-capa').classList.remove('visivel');
            document.getElementById('tela-capa').classList.add('escondido');
            document.getElementById('tela-detalhes').classList.add('visivel');
        }

        function confirmar() {
            document.getElementById('tela-detalhes').classList.remove('visivel');
            document.getElementById('tela-detalhes').classList.add('escondido');
            document.getElementById('tela-confirmacao').classList.add('visivel');
        }
    </script>
</body>
</html>
